# Source tree versioned by this repo. This is the only skills directory that
# should be edited by humans.
source_dir = "skills"

# Generated flat runtime used by tools that need `~/.agents/skills/<skill>`.
# It is intentionally ignored by Git.
runtime_dir = ".runtime/skills"

# Optional archive for skills kept for reference but excluded from normal use.
archive_dir = "skills/archive"

